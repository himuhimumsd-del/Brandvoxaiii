services:
  # Backend Web Service
  - type: web
    name: brandvox-ai-backend
    env: node
    rootDir: server
    buildCommand: yarn install
    startCommand: yarn start
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: PHONEPE_ENV
        value: PROD
      - key: PHONEPE_MERCHANT_ID
        sync: false
      - key: PHONEPE_SALT_KEY
        sync: false
      - key: PHONEPE_SALT_INDEX
        sync: false

  # Frontend Static Site
  - type: web
    name: brandvox-ai-frontend
    env: static
    rootDir: client
    buildCommand: yarn install && yarn build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
